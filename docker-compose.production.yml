# Producción detrás de Traefik (red externa "proxy" en la VM).
# En la VM: copiar .env.production.example → .env.production y rellenar secretos.
# DNS: apuntar logia.amenti.cl (o TRAEFIK_HOST_RULE) a la misma IP que Traefik.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-masonic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: app_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      CACHE_DATABASE_URL: ${CACHE_DATABASE_URL:?set CACHE_DATABASE_URL in .env}
      QUEUE_DATABASE_URL: ${QUEUE_DATABASE_URL:?set QUEUE_DATABASE_URL in .env}
      CABLE_DATABASE_URL: ${CABLE_DATABASE_URL:?set CABLE_DATABASE_URL in .env}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:?set RAILS_MASTER_KEY in .env}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      APP_HOST: ${APP_HOST:-logia.amenti.cl}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/rails/storage
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.masonic-logia-amenti.rule=${TRAEFIK_HOST_RULE:-Host(`logia.amenti.cl`)}
      - traefik.http.routers.masonic-logia-amenti.entrypoints=websecure
      - traefik.http.routers.masonic-logia-amenti.tls=true
      - traefik.http.routers.masonic-logia-amenti.tls.certresolver=letsencrypt
      - traefik.http.services.masonic-logia-amenti.loadbalancer.server.port=80

  worker:
    build:
      context: .
    restart: unless-stopped
    command: ["./bin/rake", "solid_queue:start"]
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      CACHE_DATABASE_URL: ${CACHE_DATABASE_URL:?set CACHE_DATABASE_URL in .env}
      QUEUE_DATABASE_URL: ${QUEUE_DATABASE_URL:?set QUEUE_DATABASE_URL in .env}
      CABLE_DATABASE_URL: ${CABLE_DATABASE_URL:?set CABLE_DATABASE_URL in .env}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:?set RAILS_MASTER_KEY in .env}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      APP_HOST: ${APP_HOST:-logia.amenti.cl}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/rails/storage
    networks:
      - internal

networks:
  internal:
    name: masonic_lodge_internal
  proxy:
    external: true
    name: proxy

volumes:
  postgres_data:
  storage_data:
